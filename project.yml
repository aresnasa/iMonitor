name: iMonitor

options:
  minimumXcodeGenVersion: 2.44.0
  createIntermediateGroups: true
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: iMonitor
    MACOSX_DEPLOYMENT_TARGET: "11.0"

targets:
  iMonitor:
    type: application
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: iMonitor
        excludes:
          - Info.plist
          - iMonitor.entitlements
          - Assets.xcassets
          - "Preview Content"
          - Base.lproj
      - path: iMonitor/Assets.xcassets
        buildPhase: resources
      - path: iMonitor/Preview Content/Preview Assets.xcassets
        buildPhase: resources
      - path: iMonitor/Base.lproj/Main.storyboard
        buildPhase: resources
    entitlements:
      path: iMonitor/iMonitor.entitlements
    settings:
      base:
        ARCHS: "$(ARCHS_STANDARD)"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_ASSET_PATHS: "\"iMonitor/Preview Content\""
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: iMonitor/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        MARKETING_VERSION: 0.3.0
        PRODUCT_BUNDLE_IDENTIFIER: com.aresnasa.iMonitor
        SWIFT_VERSION: 5.0
      Debug:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
      Release:
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  iMonitor:
    build:
      targets:
        iMonitor: all
    run:
      config: Debug
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    test:
      config: Debug
